<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>OTR Finder — HPC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --w:#fff;
  --g50:#F9FAFB;--g100:#F3F4F6;--g150:#EDEDEE;--g200:#E5E7EB;
  --g300:#D1D5DB;--g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;
  --g700:#374151;--g800:#1F2937;--g900:#111827;
  --sh0:0 1px 2px rgba(0,0,0,.05);
  --sh1:0 2px 8px rgba(0,0,0,.08);
  --sh2:0 8px 32px rgba(0,0,0,.10);
}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{background:var(--w);color:var(--g800);font-family:'Inter',sans-serif;font-size:15px}
button{cursor:pointer;font-family:inherit;border:none;background:none}
textarea{font-family:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px}
#app{display:flex;flex-direction:column;height:100vh;max-width:680px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--g100);background:rgba(255,255,255,.97);backdrop-filter:blur(12px);flex-shrink:0}
.hdr-name{font-weight:700;font-size:14px;color:var(--g900)}
.hdr-sub{font-size:10px;color:var(--g400);margin-top:1px}
.hdr-r{display:flex;gap:6px}
.hbtn{padding:5px 12px;border-radius:16px;background:var(--g100);color:var(--g600);font-size:12px;font-weight:500;transition:background .15s}
.hbtn:hover{background:var(--g150)}
.chat{flex:1;overflow-y:auto;padding:16px 16px 8px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:64vh;padding:24px 8px;text-align:center}
.wel-title{font-size:22px;font-weight:700;color:var(--g900);letter-spacing:-.4px;margin-bottom:22px}
.qa-col{display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px}
.qa{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1px solid var(--g200);background:var(--w);text-align:left;transition:all .14s;box-shadow:var(--sh0)}
.qa:hover{border-color:var(--g300);background:var(--g50)}
.qa-t{font-size:14px;font-weight:600;color:var(--g800)}
.qa-s{font-size:11px;color:var(--g400);margin-top:2px}
.mg{padding:4px 0}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg.user .bub{background:var(--g900);color:#fff;border-radius:18px 4px 18px 18px}
.msg.ai .bub{background:var(--g100);color:var(--g800);border-radius:4px 18px 18px 18px}
.av{width:24px;height:24px;border-radius:50%;flex-shrink:0;margin-top:4px;background:var(--g800);display:flex;align-items:center;justify-content:center}
.av svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round}
.bub{max-width:86%;padding:10px 14px;font-size:13.5px;line-height:1.62}
.thk-dots{display:inline-flex;gap:4px;align-items:center;padding:12px 14px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g300);animation:bo .85s infinite}
.dot:nth-child(2){animation-delay:.17s}.dot:nth-child(3){animation-delay:.34s}
@keyframes bo{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.opts{padding:4px 0 4px 32px;display:flex;flex-direction:column;gap:5px;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid var(--g200);background:var(--w);font-size:13px;color:var(--g700);text-align:left;transition:all .14s;box-shadow:var(--sh0)}
.opt:hover{border-color:var(--g400);background:var(--g50)}
.opt:disabled{opacity:.35;cursor:not-allowed}
.onum{min-width:20px;height:20px;border-radius:5px;background:var(--g100);color:var(--g500);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.olbl{font-weight:600;font-size:13px;color:var(--g800)}
.osub{font-size:11px;color:var(--g400);margin-top:1px}
.prog{padding:4px 14px 4px 32px;display:flex;align-items:center;gap:8px}
.pbar{flex:1;height:2px;background:var(--g100);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--g800);border-radius:2px;transition:width .4s}
.ptxt{font-size:10px;color:var(--g400);font-weight:500;white-space:nowrap}
.res{padding:4px 0 4px 32px;animation:fu .25s ease}
.res-hdr{font-size:11px;font-weight:600;color:var(--g400);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.aib{background:var(--g50);border:1px solid var(--g200);border-radius:11px;padding:13px 15px;margin-bottom:8px;font-size:13px;line-height:1.8;color:var(--g700);white-space:pre-wrap}
.aib-hdr{font-size:10px;font-weight:600;color:var(--g500);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.ratebox{background:var(--g50);border:1px solid var(--g200);border-radius:11px;padding:14px 16px;margin-bottom:8px}
.ratebox-hdr{font-size:10px;font-weight:600;color:var(--g500);letter-spacing:.06em;text-transform:uppercase;margin-bottom:11px}
.rate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.rg{background:var(--w);border:1px solid var(--g200);border-radius:9px;padding:10px 8px;text-align:center}
.rg-l{font-size:9px;color:var(--g400);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.rg-v{font-size:16px;font-weight:700;color:var(--g900);letter-spacing:-.3px}
.rg-s{font-size:10px;color:var(--g400);margin-top:2px}
.rate-range{margin-bottom:11px}
.rr-lbl{font-size:11px;font-weight:600;color:var(--g600);margin-bottom:6px}
.rr-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.rr-tag{font-size:10px;color:var(--g400);width:36px;flex-shrink:0;font-weight:500}
.rr-bar{flex:1;height:5px;background:var(--g200);border-radius:5px;overflow:hidden}
.rr-fill{height:100%;background:var(--g400);border-radius:5px}
.rr-fill.mid{background:var(--g700)}
.rr-val{font-size:11px;font-weight:600;color:var(--g700);width:58px;text-align:right;flex-shrink:0}
.mkt-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mkt-lbl{font-size:11px;color:var(--g500)}
.mkt-badge{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;background:var(--g200);color:var(--g700)}
.mkt-fsc{font-size:11px;color:var(--g400);margin-left:auto}
.rate-tips{font-size:12px;color:var(--g600);line-height:1.75;margin-bottom:8px}
.rate-note{font-size:10px;color:var(--g300);margin-top:10px;padding-top:9px;border-top:1px solid var(--g200)}
.lvis{display:flex;align-items:center;gap:8px;background:var(--g50);border:1px solid var(--g200);border-radius:10px;padding:9px 13px;margin-bottom:8px}
.ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.lline{flex:1;height:1px;background:var(--g300);position:relative}
.larrow{position:absolute;top:-7px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--g400);font-weight:500}
.ltype{font-size:10px;color:var(--g400);margin-left:auto}
.cards{display:flex;flex-direction:column;gap:7px}
.cc{background:var(--w);border:1px solid var(--g200);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .16s;box-shadow:var(--sh0)}
.cc:hover{border-color:var(--g400);box-shadow:var(--sh1)}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.cc-rnk{width:19px;height:19px;border-radius:5px;background:var(--g100);color:var(--g500);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:monospace}
.cc-rnk.r1{background:var(--g900);color:#fff}
.cc-rnk.r2{background:var(--g600);color:#fff}
.cc-rnk.r3{background:var(--g400);color:#fff}
.cc-nw{flex:1;min-width:0}
.cc-name{font-size:13px;font-weight:700;color:var(--g900)}
.cc-hq{font-size:10px;color:var(--g400);margin-top:1px}
.cc-sv{width:26px;height:26px;border-radius:7px;background:var(--g100);color:var(--g500);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0}
.cc-sv.on{background:var(--g900);color:#fff}
.cc-row{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.star{font-size:10px;color:var(--g300)}.star.on{color:var(--g800)}
.sn{font-size:10px;color:var(--g400)}
.s-ok{background:var(--g100);color:var(--g600);font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600}
.s-bk{background:var(--g100);color:var(--g500);font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600}
.rt{font-size:10px;color:var(--g400);margin-left:auto}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:7px}
.sg{background:var(--g50);border-radius:6px;padding:5px 6px;text-align:center}
.sgl{font-size:8px;color:var(--g400);margin-bottom:1px;text-transform:uppercase;letter-spacing:.03em}
.sgv{font-size:10px;font-weight:700;color:var(--g700)}
.ctags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.tg{font-size:9px;padding:1px 7px;border-radius:20px;background:var(--g100);color:var(--g600);font-weight:500}
.cbdg{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.bdg{font-size:9px;padding:1px 6px;border-radius:4px;background:var(--g100);color:var(--g500);font-weight:500}
.cmc{font-size:8px;color:var(--g300);margin-left:auto;font-family:monospace}
.cact{display:flex;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid var(--g100)}
.cbtn{flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:600;transition:all .14s}
.cbtn.p{background:var(--g900);color:#fff}.cbtn.p:hover{background:var(--g800)}
.cbtn.s{background:var(--g100);color:var(--g700)}.cbtn.s:hover{background:var(--g150)}
.inp-area{padding:10px 16px 20px;border-top:1px solid var(--g100);background:rgba(255,255,255,.97);backdrop-filter:blur(12px);flex-shrink:0}
.ac-wrap{position:relative}
.acdrop{position:absolute;bottom:calc(100% + 5px);left:0;right:0;z-index:100;background:var(--w);border:1px solid var(--g200);border-radius:12px;box-shadow:var(--sh2);overflow:hidden;display:none}
.aci{padding:9px 14px;font-size:13px;color:var(--g700);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .1s}
.aci:hover,.aci.hl{background:var(--g50)}
.aci mark{background:transparent;color:var(--g900);font-weight:700;padding:0}
.hub-c{font-size:9px;background:var(--g100);color:var(--g500);padding:1px 5px;border-radius:4px;margin-left:auto;font-weight:600}
.ibox{display:flex;align-items:flex-end;gap:6px;background:var(--g100);border-radius:22px;padding:5px 5px 5px 14px;transition:box-shadow .2s,background .2s}
.ibox:focus-within{background:var(--w);box-shadow:0 0 0 1.5px var(--g800),var(--sh1)}
.ibox textarea{flex:1;background:transparent;border:none;outline:none;color:var(--g900);font-size:14px;resize:none;line-height:1.5;padding:4px 0;min-height:24px;max-height:96px}
.ibox textarea::placeholder{color:var(--g400)}
.sbtn{width:32px;height:32px;border-radius:13px;flex-shrink:0;background:var(--g900);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .14s}
.sbtn:hover{background:var(--g800)}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.3);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--w);border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;padding:16px 18px 28px;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:30px;height:4px;border-radius:4px;background:var(--g200);margin:0 auto 14px}
.mt{font-size:17px;font-weight:700;color:var(--g900);margin-bottom:3px}
.ms{font-size:12px;color:var(--g400);margin-bottom:13px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.mi{background:var(--g50);border-radius:8px;padding:9px 11px}
.mik{font-size:9px;color:var(--g400);font-weight:500;margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.miv{font-size:12px;color:var(--g800);font-weight:600}
.macts{display:flex;gap:6px;margin-top:12px}
.mbtn{flex:1;padding:11px;border-radius:10px;font-size:13px;font-weight:600;transition:all .14s;text-align:center;display:flex;align-items:center;justify-content:center}
.mbtn.p{background:var(--g900);color:#fff}.mbtn.p:hover{background:var(--g800)}
.mbtn.s{background:var(--g100);color:var(--g700)}.mbtn.s:hover{background:var(--g150)}
.rfqpre{background:var(--g50);border:1px solid var(--g200);border-radius:9px;padding:13px;font-size:11.5px;color:var(--g700);white-space:pre-wrap;max-height:280px;overflow-y:auto;line-height:1.7;font-family:'Courier New',monospace}
.cpybtn{width:100%;margin-top:8px;padding:11px;border-radius:10px;font-size:13px;font-weight:600;background:var(--g900);color:#fff;transition:all .14s}
.cpybtn:hover{background:var(--g800)}.cpybtn.ok{background:var(--g600)}
@media(max-width:480px){.sgrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div><div class="hdr-name">OTR Finder</div></div>
    <div class="hdr-r">
      <button class="hbtn" onclick="showSaved()">Saved (<span id="sc">0</span>)</button>
      <button class="hbtn" onclick="goHome()">New</button>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="inp-area">
    <div class="ac-wrap"><div class="acdrop" id="acdrop"></div></div>
    <div class="ibox">
      <textarea id="ui" rows="1" placeholder="메시지를 입력하세요..." oninput="autoR(this)" onkeydown="onK(event)"></textarea>
      <button class="sbtn" onclick="send()">↑</button>
    </div>
  </div>
</div>
<div class="overlay" id="ov" onclick="if(event.target===this)closeM()">
  <div class="modal"><div class="mh"></div><div id="mc"></div></div>
</div>

<script>
// ─── CITY DICTIONARY ─────────────────────────────────────────────
const CITY_MAP={
  '엘에이':'Los Angeles, CA','로스앤젤레스':'Los Angeles, CA','로스엔젤레스':'Los Angeles, CA','LA':'Los Angeles, CA','라':'Los Angeles, CA',
  '시카고':'Chicago, IL','쉬카고':'Chicago, IL',
  '달라스':'Dallas, TX','댈러스':'Dallas, TX','달러스':'Dallas, TX',
  '뉴욕':'New York, NY','뉴욕시':'New York, NY',
  '휴스턴':'Houston, TX','휴우스턴':'Houston, TX',
  '라스베가스':'Las Vegas, NV','라스베이거스':'Las Vegas, NV','라스 베가스':'Las Vegas, NV',
  '애틀란타':'Atlanta, GA','애틀래타':'Atlanta, GA',
  '마이애미':'Miami, FL','마이아미':'Miami, FL',
  '시애틀':'Seattle, WA','씨애틀':'Seattle, WA',
  '포틀랜드':'Portland, OR',
  '덴버':'Denver, CO',
  '피닉스':'Phoenix, AZ','피닉':'Phoenix, AZ',
  '샌프란시스코':'San Francisco, CA','샌프란':'San Francisco, CA','에스에프':'San Francisco, CA','SF':'San Francisco, CA',
  '샌디에고':'San Diego, CA','산디에고':'San Diego, CA',
  '샌안토니오':'San Antonio, TX',
  '낙스빌':'Nashville, TN','내슈빌':'Nashville, TN',
  '멤피스':'Memphis, TN',
  '루이빌':'Louisville, KY','루이스빌':'Louisville, KY',
  '인디애나폴리스':'Indianapolis, IN',
  '콜럼버스':'Columbus, OH',
  '클리블랜드':'Cleveland, OH',
  '디트로이트':'Detroit, MI',
  '밀워키':'Milwaukee, WI',
  '미니애폴리스':'Minneapolis, MN','미네아폴리스':'Minneapolis, MN',
  '캔자스시티':'Kansas City, MO','캔사스시티':'Kansas City, MO',
  '세인트루이스':'St. Louis, MO','세인트 루이스':'St. Louis, MO',
  '올랜도':'Orlando, FL',
  '탬파':'Tampa, FL',
  '잭슨빌':'Jacksonville, FL',
  '샬럿':'Charlotte, NC','샬로트':'Charlotte, NC',
  '롤리':'Raleigh, NC',
  '리치먼드':'Richmond, VA',
  '볼티모어':'Baltimore, MD',
  '필라델피아':'Philadelphia, PA','필라':'Philadelphia, PA',
  '피츠버그':'Pittsburgh, PA',
  '보스턴':'Boston, MA',
  '알버커키':'Albuquerque, NM','앨버커키':'Albuquerque, NM',
  '투싼':'Tucson, AZ','투손':'Tucson, AZ',
  '엘패소':'El Paso, TX',
  '라레도':'Laredo, TX',
  '오클라호마시티':'Oklahoma City, OK',
  '툴사':'Tulsa, OK',
  '오마하':'Omaha, NE',
  '워싱턴':'Washington, DC','워싱턴DC':'Washington, DC',
  '뉴어크':'Newark, NJ','뉴왁':'Newark, NJ',
  '오클랜드':'Oakland, CA',
  '새크라멘토':'Sacramento, CA','사크라멘토':'Sacramento, CA',
  '롱비치':'Long Beach, CA','롱 비치':'Long Beach, CA',
  '프레즈노':'Fresno, CA',
  '리버사이드':'Riverside, CA',
  '토론토':'Toronto, ON','밴쿠버':'Vancouver, BC','몬트리올':'Montreal, QC','캘거리':'Calgary, AB',
  '몬테레이':'Monterrey, Mexico','멕시코':'Monterrey, Mexico',
  '에서':'','-에서':'','까지':'','-까지':'','to':'','from':'','→':'','-':'',',':'',
};

const CITIES_EN=['Albuquerque, NM','Arlington, TX','Atlanta, GA','Austin, TX','Baltimore, MD','Boston, MA','Charlotte, NC','Chicago, IL','Cincinnati, OH','Cleveland, OH','Columbus, OH','Dallas, TX','Denver, CO','Detroit, MI','El Paso, TX','Fort Worth, TX','Houston, TX','Indianapolis, IN','Jacksonville, FL','Kansas City, MO','Laredo, TX','Las Vegas, NV','Long Beach, CA','Los Angeles, CA','Louisville, KY','Memphis, TN','Miami, FL','Milwaukee, WI','Minneapolis, MN','Nashville, TN','New Orleans, LA','New York, NY','Newark, NJ','Oakland, CA','Oklahoma City, OK','Orlando, FL','Philadelphia, PA','Phoenix, AZ','Pittsburgh, PA','Portland, OR','Raleigh, NC','Sacramento, CA','San Antonio, TX','San Diego, CA','San Francisco, CA','San Jose, CA','Seattle, WA','St. Louis, MO','Tampa, FL','Tucson, AZ','Washington, DC','Port of Los Angeles, CA','Port of Long Beach, CA','Port of Houston, TX','Port of Savannah, GA','Port of New York, NJ','Chicago Rail Hub, IL','Dallas Freight Hub, TX','Toronto, ON','Vancouver, BC','Monterrey, Mexico','Laredo Border, TX'];

function parseCityFromText(text){
  for(const [ko,en] of Object.entries(CITY_MAP)){
    if(en&&text.includes(ko))return en;
  }
  const lower=text.toLowerCase();
  for(const city of CITIES_EN){
    const name=city.split(',')[0].toLowerCase();
    if(lower.includes(name))return city;
  }
  return '';
}

function parseLaneText(text){
  let t=text.trim();
  const patterns=[
    /(.+?)에서\s*(.+?)(?:까지|로|으로)?$/,
    /(.+?)\s*→\s*(.+)/,
    /(.+?)\s+to\s+(.+)/i,
    /(.+?)\s*[-–]\s*(.+)/,
    /(.+?)\s+from\s+(.+)/i,
  ];
  for(const pat of patterns){
    const m=t.match(pat);
    if(m){
      const a=m[1].trim();
      const b=m[2].trim().replace(/까지|로$|으로$/,'').trim();
      const origin=parseCityFromText(a);
      const dest=parseCityFromText(b);
      if(origin||dest)return{origin,dest};
    }
  }
  const found=[];
  for(const [ko,en] of Object.entries(CITY_MAP)){
    if(en&&t.includes(ko)&&!found.find(f=>f.en===en)){
      found.push({ko,en,idx:t.indexOf(ko)});
    }
  }
  const lower=t.toLowerCase();
  for(const city of CITIES_EN){
    const name=city.split(',')[0].toLowerCase();
    const idx=lower.indexOf(name);
    if(idx>=0&&!found.find(f=>f.en===city)){
      found.push({ko:name,en:city,idx});
    }
  }
  found.sort((a,b)=>a.idx-b.idx);
  if(found.length>=2)return{origin:found[0].en,dest:found[1].en};
  if(found.length===1)return{origin:found[0].en,dest:''};
  return{origin:'',dest:''};
}

};
function estimateDist(origin,dest){
  const key=`${origin}|${dest}`;
  if(DIST_TABLE[key])return DIST_TABLE[key];
  const rkey=`${dest}|${origin}`;
  if(DIST_TABLE[rkey])return DIST_TABLE[rkey];
  return 1200;
}
function calcRate(origin,dest,eq){
  const dist=estimateDist(origin,dest);
  const tbl=RATE_TABLE[eq]||RATE_TABLE['Dry Van'];
  const mid=Math.round(dist*tbl.rpm);
  const low=Math.round(mid*0.88);
  const high=Math.round(mid*1.16);
  const rpmMid=tbl.rpm;
  const transit=Math.ceil(dist/550);
  return{dist,low,mid,high,rpmLow:(rpmMid*0.88).toFixed(2),rpmMid:rpmMid.toFixed(2),rpmHigh:(rpmMid*1.16).toFixed(2),transit};
}

      <div class="ldot" style="background:var(--g400)"></div>
      <span class="ltype">${eq||'OTR'}</span>
    </div>`;
    ch.appendChild(lv);
  }
  const r=calcRate(origin,dest,eq);
  const maxR=r.high;
  const dist=r.dist;
  const mkt=dist>2000?'Tight · 공급 부족':dist>1000?'Balanced · 균형':'Soft · 공급 우세';
  const tips=[
    '화물 픽업/딜리버리 유연성을 제공하면 더 좋은 레이트를 받을 수 있습니다.',
    '복수 캐리어에 동시 RFQ를 보내 경쟁 입찰을 유도하세요.',
    '월간 볼륨을 약속하면 장기 계약 할인을 협상할 수 있습니다.',
  ];
  const rw=document.createElement('div');rw.className='res';
  rw.innerHTML=`<div class="ratebox">
    <div class="ratebox-hdr">운임 추정</div>
    <div class="rate-grid">
      <div class="rg"><div class="rg-l">거리</div><div class="rg-v">${r.dist.toLocaleString()}</div><div class="rg-s">miles</div></div>
      <div class="rg"><div class="rg-l">예상 운임 (중간)</div><div class="rg-v">$${r.mid.toLocaleString()}</div><div class="rg-s">${r.rpmMid}/mile</div></div>
      <div class="rg"><div class="rg-l">운송 기간</div><div class="rg-v">${r.transit}</div><div class="rg-s">days</div></div>
    </div>
    <div class="rate-range">
      <div class="rr-lbl">운임 범위</div>
      <div class="rr-row"><span class="rr-tag">Low</span><div class="rr-bar"><div class="rr-fill" style="width:${Math.round(r.low/maxR*100)}%"></div></div><span class="rr-val">$${r.low.toLocaleString()}</span></div>
      <div class="rr-row"><span class="rr-tag">Mid</span><div class="rr-bar"><div class="rr-fill mid" style="width:${Math.round(r.mid/maxR*100)}%"></div></div><span class="rr-val">$${r.mid.toLocaleString()}</span></div>
      <div class="rr-row"><span class="rr-tag">High</span><div class="rr-bar"><div class="rr-fill mid" style="width:100%"></div></div><span class="rr-val">$${r.high.toLocaleString()}</span></div>
    </div>
    <div class="mkt-row">
      <span class="mkt-lbl">시장 상황</span>
      <span class="mkt-badge">${mkt}</span>
      <span class="mkt-fsc">연료 할증 ~20%</span>
    </div>
    <div class="rate-tips">${tips.map(t=>`• ${t}`).join('<br/>')}</div>
    <div class="rate-note">※ 시장 평균 기반 추정치입니다. 실제 운임은 계절·수급에 따라 달라질 수 있습니다.<br/>정확한 현재 시세: <a href="https://dat.com" target="_blank" style="color:var(--g600);text-decoration:underline">DAT.com</a> · <a href="https://freightwaves.com" target="_blank" style="color:var(--g600);text-decoration:underline">FreightWaves</a></div>
  </div>`;
  ch.appendChild(rw);scr();
  setTimeout(()=>{
    addOpts([
      {l:'이 레인 캐리어 찾기'},

      {l:'처음으로'},
    ],(o)=>{
      if(o.l.includes('캐리어'))runCarrierSearch();
      else if(o.l.includes('다른'))startRate();
      else showWelcome();
    });

}

// ─── MC LOOKUP ───────────────────────────────────────────────────
function startMC(){
  ch.innerHTML='';addUser('MC # 조회');
  setTimeout(async()=>{
    addThink();await slp(350);rmThink();
    addAI('MC 번호, DOT 번호, 또는 캐리어 이름을 입력해주세요.');
    ST.pending='__mc__';
    document.getElementById('ui').placeholder='예: MC-042958 또는 J.B. Hunt...';
    document.getElementById('ui').focus();
  },300);
}

async function doMC(q){
  // 1) 로컬 DB 먼저 확인
  const local=C.find(c=>
    c.mc.toLowerCase().includes(q.toLowerCase())||
    c.dot.toLowerCase().includes(q.toLowerCase())||
    c.n.toLowerCase().includes(q.toLowerCase())
  );
  if(local){
    const w=document.createElement('div');w.className='res';
    w.innerHTML=`<div class="res-hdr">검색 결과 (로컬 DB)</div><div class="cards">${cHTML(local,1)}</div>`;
    ch.appendChild(w);scr();
    setTimeout(()=>{
      addOpts([{l:'캐리어 찾기'},{l:'다른 MC 조회'},{l:'처음으로'}],(o)=>{
        if(o.l.includes('캐리어'))startCarrier();
        else if(o.l.includes('MC'))startMC();
        else showWelcome();
      });
    },400);
    return;
  }

  // 2) FMCSA API 조회
  addThink();
  const WORKER='https://otr-finder-api.wayneslee1018.workers.dev';
  let apiUrl='';
  const clean=q.replace(/mc-?/i,'').trim();

  if(q.match(/^mc-?\d+$/i)) apiUrl=`${WORKER}/mc/${clean}`;
  else if(q.match(/^\d{6,}$/)) apiUrl=`${WORKER}/dot/${clean}`;
  else apiUrl=`${WORKER}/name/${encodeURIComponent(q)}`;

  try{
    const res=await fetch(apiUrl);
    const data=await res.json();
    rmThink();

    // ✅ 수정된 파싱 — content 배열에서 carrier 객체 추출
    const carriers=(data.content||[]).map(item=>item.carrier||item).filter(Boolean);

    if(!carriers.length){
      addAI(`"${q}" — FMCSA에서도 찾지 못했습니다.\n공식 조회: <a href="https://safer.fmcsa.dot.gov" target="_blank" style="color:var(--g800);text-decoration:underline">safer.fmcsa.dot.gov</a>`);
      ST.pending='__mc__';return;
    }

    const w=document.createElement('div');w.className='res';
    w.innerHTML=`<div class="res-hdr">FMCSA 검색 결과 ${carriers.length}개</div>
    <div class="cards">${carriers.slice(0,5).map((c,i)=>{
      const name=c.legalName||c.dbaName||'Unknown';
      const auth=c.allowedToOperate==='Y'?'Active':'Inactive';
      const city=`${c.phyCity||''}, ${c.phyState||''}`.trim().replace(/^,\s*/,'');
      const safeRating=c.safetyRating||'N/A';
      const trucks=c.totalPowerUnits>0?c.totalPowerUnits.toLocaleString():'—';
      const drivers=c.totalDrivers>0?c.totalDrivers.toLocaleString():'—';
      return`<div class="cc">
        <div class="cc-top">
          <div class="cc-rnk ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div>
          <div class="cc-nw">
            <div class="cc-name">${name}</div>
            <div class="cc-hq">${city}</div>
          </div>
          <span class="${auth==='Active'?'s-ok':'s-bk'}">${auth}</span>
        </div>
        <div class="sgrid" style="margin-top:8px">
          <div class="sg"><div class="sgl">Trucks</div><div class="sgv">${trucks}</div></div>
          <div class="sg"><div class="sgl">Drivers</div><div class="sgv">${drivers}</div></div>
          <div class="sg"><div class="sgl">Safety</div><div class="sgv">${safeRating}</div></div>
          <div class="sg"><div class="sgl">OOS Rate</div><div class="sgv">${c.oosRate||'—'}</div></div>
        </div>
        <div class="cbdg" style="margin-top:6px">
          <span class="bdg">DOT# ${c.dotNumber||'-'}</span>
          <span class="bdg">MC# ${c.mcNumber||'-'}</span>
          ${c.carrierOperation?`<span class="bdg">${c.carrierOperation.carrierOperationDesc||''}</span>`:''}
          ${c.hazmatFlag==='Y'?'<span class="bdg">Hazmat</span>':''}
        </div>
      </div>`;
    }).join('')}</div>`;
    ch.appendChild(w);scr();

  }catch(e){
    rmThink();
    addAI(`조회 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.`);
    ST.pending='__mc__';
  }

  setTimeout(()=>{
    addOpts([{l:'다른 MC 조회'},{l:'캐리어 찾기'},{l:'처음으로'}],(o)=>{
      if(o.l.includes('MC'))startMC();
      else if(o.l.includes('캐리어'))startCarrier();
      else showWelcome();
    });
  },400);
}

// ─── CARRIER CARD ────────────────────────────────────────────────

  const rk=rank<=3?`r${rank}`:'';
  const sf=c.safe==='N/A'?`<span class="s-bk">Broker</span>`:`<span class="s-ok">Satisfactory</span>`;
  return`<div class="cc" onclick="openC(${c.id})">
    <div class="cc-top">
      <div class="cc-rnk ${rk}">${rank}</div>
      <div class="cc-nw"><div class="cc-name">${c.n}</div><div class="cc-hq">Est.${c.yr} · ${c.hq}</div></div>
      <button class="cc-sv${sv?' on':''}" onclick="event.stopPropagation();togSv(C.find(x=>x.id===${c.id}))" title="저장">✓</button>
    </div>
    <div class="cc-row">${st}<span class="sn">&nbsp;${c.rat}&nbsp;(${c.rev})</span>&nbsp;${sf}<span class="rt">${c.rt}</span></div>

      <div class="sg"><div class="sgl">Fleet</div><div class="sgv">${c.fl>0?c.fl.toLocaleString():'Broker'}</div></div>
      <div class="sg"><div class="sgl">On-Time</div><div class="sgv">${c.ot}%</div></div>
      <div class="sg"><div class="sgl">Avg Pay</div><div class="sgv">~${c.pay}d</div></div>
      <div class="sg"><div class="sgl">Credit</div><div class="sgv">${c.cr}/100</div></div>
    </div>
    <div class="ctags">${c.eq.map(e=>`<span class="tg">${e}</span>`).join('')}${c.svc.slice(0,3).map(s=>`<span class="tg">${s}</span>`).join('')}</div>
    <div class="cbdg">
      ${c.edi?'<span class="bdg">EDI Tracking</span>':''}
      ${c.haz?'<span class="bdg">Hazmat</span>':''}

    </div>
  </div>`;
}
function refreshSvBtns(){
  document.querySelectorAll('.cc').forEach(card=>{
    const m=card.getAttribute('onclick')||'';const mm=m.match(/openC\((\d+)\)/);
    if(mm){const c=C.find(x=>x.id===parseInt(mm[1]));if(c){const b=card.querySelector('.cc-sv');if(b)b.className='cc-sv'+(isS(c)?' on':'')}}
  });
}

// ─── MODALS ──────────────────────────────────────────────────────
function openC(id){
  const c=C.find(x=>x.id===id);if(!c)return;
  document.getElementById('mc').innerHTML=`
    <div class="mt">${c.n}</div>
    <div class="ms">Est.${c.yr} · ${c.hq} · ${c.ph}</div>
    <div class="mgrid">
      ${[['MC#',c.mc],['DOT#',c.dot],['Authority',c.auth],['Safety',c.safe],['Fleet',c.fl>0?c.fl.toLocaleString():'Asset-light'],['Drivers',c.dr>0?c.dr.toLocaleString():'Independent'],['Avg Pay Days',c.pay+'d'],['Credit Score',c.cr+'/100'],['On-Time',c.ot+'%'],['Rate Index',c.rt]].map(([k,v])=>`<div class="mi"><div class="mik">${k}</div><div class="miv">${v}</div></div>`).join('')}
    </div>
    <div class="ctags">${c.spec.map(s=>`<span class="tg">${s}</span>`).join('')}</div>
    <div class="macts">
      <button class="mbtn p" onclick="openRFQ(${c.id});closeM()">RFQ 이메일 생성</button>
      <a class="mbtn s" href="https://${c.wb}" target="_blank">웹사이트</a>
    </div>`;
  document.getElementById('ov').classList.add('on');
}

async function openRFQ(id){
  const c=C.find(x=>x.id===id);
  document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일 생성</div><div class="ms">To: ${c.n}</div><div style="text-align:center;padding:24px;color:var(--g400);font-size:13px">생성 중...</div>`;
  document.getElementById('ov').classList.add('on');
  try{
    const txt=await aiCall(`Write a professional freight RFQ email from Hyundai Platform Corporation (HPC), Los Angeles CA to ${c.n}.
Lane: ${ST.origin||'TBD'} to ${ST.dest||'TBD'} | Equipment: ${ST.eq||'Dry Van'} | Weight: ${ST.weight||'TBD'} | MC#: ${c.mc} | Phone: ${c.ph}
Format: Subject line first, blank line, email body under 180 words. Include brief HPC intro, rate quote request, transit time inquiry, EDI tracking capability, professional closing.`,500);
    document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일</div><div class="ms">To: ${c.n}</div><pre class="rfqpre">${txt}</pre><button class="cpybtn" id="cpyb" onclick="cpyRFQ()">클립보드에 복사</button>`;
    window._rfqTxt=txt;
  }catch(e){
    document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일 생성</div><div class="ms" style="color:var(--g500)">Claude.ai 환경에서만 AI 이메일 생성이 가능합니다.<br/>아래 정보로 직접 연락해주세요:<br/><br/><b>${c.n}</b><br/>${c.ph}<br/>${c.wb}</div>`;
  }
}
function cpyRFQ(){
  if(!window._rfqTxt)return;
  navigator.clipboard.writeText(window._rfqTxt).then(()=>{
    const b=document.getElementById('cpyb');if(b){b.textContent='복사됨';b.className='cpybtn ok';setTimeout(()=>{b.textContent='클립보드에 복사';b.className='cpybtn'},2000)}
  });
}
function closeM(){document.getElementById('ov').classList.remove('on')}
function showSaved(){
  const mc=document.getElementById('mc');
  mc.innerHTML=ST.saved.length
    ?`<div class="mt">저장된 캐리어</div><div class="ms">${ST.saved.length}개</div><div class="cards">${ST.saved.map((c,i)=>cHTML(c,i+1)).join('')}</div>`
    :`<div class="mt">저장된 캐리어</div><div class="ms">아직 저장된 캐리어가 없습니다.</div>`;
  document.getElementById('ov').classList.add('on');
}

// ─── AUTOCOMPLETE ────────────────────────────────────────────────
let acSg=[],acHL=0;
function doAC(q){
  const drop=document.getElementById('acdrop');
  if(!q||q.length<2){drop.style.display='none';return}
  const lower=q.toLowerCase();
  const a=CITIES_EN.filter(c=>c.toLowerCase().startsWith(lower)).slice(0,5);
  const b=CITIES_EN.filter(c=>!c.toLowerCase().startsWith(lower)&&c.toLowerCase().includes(lower)).slice(0,3);
  acSg=[...a,...b].slice(0,7);acHL=0;
  if(!acSg.length){drop.style.display='none';return}
  drop.style.display='block';
  drop.innerHTML=acSg.map((city,i)=>{
    const isH=city.includes('Port of')||city.includes('Hub')||city.includes('Border');
    const idx=city.toLowerCase().indexOf(lower);
    const hi=idx>=0?city.slice(0,idx)+`<mark>${city.slice(idx,idx+q.length)}</mark>`+city.slice(idx+q.length):city;
    return`<div class="aci${i===acHL?' hl':''}" onmousedown="event.preventDefault();selAC('${city.replace(/'/g,"\\'")}')">
      ${hi}${isH?'<span class="hub-c">HUB</span>':''}
    </div>`;
  }).join('');
}
function selAC(city){const ui=document.getElementById('ui');ui.value=city;autoR(ui);document.getElementById('acdrop').style.display='none'}
function closeAC(){document.getElementById('acdrop').style.display='none'}

// ─── INPUT ───────────────────────────────────────────────────────
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,96)+'px'}
function onK(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();return}
  const q=e.target.value+(e.key.length===1?e.key:'');
  if(ST.pending==='__lane__'||ST.pending==='__rate_lane__')doAC(q);
  else closeAC();
}
function send(){
  const ui=document.getElementById('ui');const val=ui.value.trim();if(!val)return;
  ui.value='';ui.style.height='auto';closeAC();
  const num=parseInt(val);
  if(!isNaN(num)&&num>=1&&ST.optOn){
    const btns=document.querySelectorAll('#ow button');
    if(btns[num-1]){btns[num-1].click();return}
  }
  if(ST.pending){
    const p=ST.pending;ST.pending=null;addUser(val);
    if(p==='__lane__')handleLaneInput(val);
    else if(p==='__rate_lane__')handleRateLane(val);
    else if(p==='__mc__')doMC(val);
    return;
  }
  addUser(val);
  const l=val.toLowerCase();
  if(l.includes('운임')||l.includes('rate')||l.includes('얼마')||l.includes('비용'))startRate();
  else if(l.includes('찾')||l.includes('캐리어')||l.includes('carrier'))startCarrier();
  else if(l.includes('mc-')||l.match(/\d{6,}/))doMC(val);
  else{
    const{origin,dest}=parseLaneText(val);
    if(origin||dest){ST.origin=origin;ST.dest=dest;ch.innerHTML='';addUser(val);handleLaneInput(val)}
    else{
      setTimeout(async()=>{addThink();await slp(350);rmThink();addAI('무엇을 도와드릴까요?');addOpts([{l:'캐리어 찾기'},{l:'운임 조회'},{l:'MC # 조회'},{l:'처음으로'}],(o)=>{if(o.l.includes('캐리어'))startCarrier();else if(o.l.includes('운임'))startRate();else if(o.l.includes('MC'))startMC();else showWelcome()})},0);
    }
  }
}

function goHome(){showWelcome()}
window.startCarrier=startCarrier;window.startRate=startRate;window.startMC=startMC;
window.openC=openC;window.openRFQ=openRFQ;window.cpyRFQ=cpyRFQ;window.closeM=closeM;
window.showSaved=showSaved;window.goHome=goHome;window.selAC=selAC;window.togSv=togSv;

document.getElementById('sc').textContent=ST.saved.length;
showWelcome();
</script>
